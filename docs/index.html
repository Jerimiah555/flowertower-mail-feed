<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flower Tower Mail Feed</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101414;
        --panel: #18201d;
        --text: #f3efe6;
        --muted: #b9c8b7;
        --accent: #f0c868;
        --line: #2d3b35;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }

      code {
        display: block;
        padding: 12px;
        overflow-wrap: anywhere;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #0c1110;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Flower Tower Mail Feed</h1>
      <p>Public one-way broadcast mail for updates, promos, and simple rewards.</p>
      <p><a href="./mail/v1/feed.json">Open live feed JSON</a></p>
      <code>EXPO_PUBLIC_MAIL_FEED_URL=https://jerimiah555.github.io/flowertower-mail-feed/mail/v1/feed.json</code>
    </main>
  </body>
</html>
